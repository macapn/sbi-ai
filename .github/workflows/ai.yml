name: Sś†™AI

on:
  schedule:
    - cron: "0 23 * * 0-4"
    - cron: "0 2 * * 0-4"
    - cron: "0 5 * * 0-4"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - run: pip install -r requirements.txt

    - run: python sbi_ai.py
