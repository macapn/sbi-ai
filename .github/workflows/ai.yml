name: S株AI

on:
  workflow_dispatch:
  schedule:
    - cron: "0 23 * * 0-4"  # 08:00 JST
    - cron: "0 2 * * 0-4"   # 11:00 JST
    - cron: "0 5 * * 0-4"   # 14:00 JST

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    # ① リポジトリ取得
    - name: Checkout repository
      uses: actions/checkout@v4

    # ② Pythonセットアップ
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # ③ ライブラリインストール（ここが重要）
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy scikit-learn xgboost pandas yfinance requests

    # ④ AI実行
    - name: Run S株 AI
      run: python sbi_ai.py
